<!DOCTYPE html>
<html>
<head>
    <title>Keystroke Emotion Test</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
        }

        select, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            border-radius: 5px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Deteksi Emosi dari Ketikan</h2>

    <p>Ketik kalimat berikut:</p>
    <b>Saya sedang mengerjakan skripsi</b>

    <br><br>

    <textarea id="textInput" rows="4"></textarea>

    <br><br>

    <select id="emotion">
        <option value="marah">Marah</option>
        <option value="stres">Stres</option>
        <option value="netral">Netral</option>
    </select>

    <button onclick="submitData()">Kirim</button>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
