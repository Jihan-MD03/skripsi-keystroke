<!DOCTYPE html>
<html>
<head>
    <title>Keystroke Emotion Test</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            padding: 50px;
            color: #333;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #667eea;
            outline: none;
        }

        button {
            padding: 12px;
            margin-top: 15px;
            width: 100%;
            border-radius: 8px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        /* LOADING */
        #loading {
            display: none;
            margin-top: 15px;
            font-weight: bold;
            color: #667eea;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {opacity: 0.3;}
            50% {opacity: 1;}
            100% {opacity: 0.3;}
        }

        /* HASIL */
        #hasilBox {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f4f6ff;
            animation: slideUp 0.5s ease;
        }

        #hasil {
            font-size: 22px;
            font-weight: bold;
        }

        /* ANIMASI */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes slideUp {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Deteksi Emosi dari Ketikan</h2>

    <p>Ketik kalimat berikut:</p>
    <b>Saya sedang mengerjakan skripsi</b>

    <br><br>

    <textarea id="textInput" rows="4" placeholder="Mulai mengetik di sini..."></textarea>

    <button onclick="submitData()">Analisis Emosi</button>

    <!-- LOADING -->
    <div id="loading">Analyzing...</div>

    <!-- HASIL -->
    <div id="hasilBox">
        <h3>Hasil Analisis:</h3>
        <p id="hasil"></p>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
